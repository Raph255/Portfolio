        <script>
            function PointerEnable() {
            /* Active les liens cliquables  */
                var elem = document.getElementsByTagName('a') ;
                for ( i = 1 ; i < elem.length ; i++){
                    elem[i].style.pointerEvents = 'all'
                }
            }
            function PointerDisable() {
            /* Désactive les liens cliquables */
                var elem = document.getElementsByTagName('a') ;
                for ( i = 1 ; i < elem.length ; i++){
                    elem[i].style.pointerEvents = 'none'
                }
            }
        </script>
