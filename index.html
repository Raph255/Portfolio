        <script src="https://kit.fontawesome.com/d974b66ed4.js" crossorigin="anonymous"></script>
        <script>

            function PointerEnable() {
               /* Active les liens cliquables  */
                var elem = document.getElementsByTagName('a') ;
                for ( i = 0 ; i < elem.length ; i++){
                    elem[i].style.pointerEvents = 'all'
                }
            }
            function PointerDisable() {
                /* Désactive les liens cliquables */
                var elem = document.getElementsByTagName('a') ;
                for ( i = 0 ; i < elem.length ; i++){
                    elem[i].style.pointerEvents = 'none'
                }
            }



        </script>
    </head>
    <body>
            <ul onmouseover="setTimeout('PointerEnable()',800)" onmouseout="setTimeout('PointerDisable()',800)">    
            <!-- Quand survolé, appel de la fonction PointerEnable avec 800ms de délai -->
            <!-- Quand le survol prend fin, appel de la fonction PointerDisable avec 800ms de délai -->           
            <!-- 800ms = temps que l'animation de la bulle principale s'achève. Cela empêche de pouvoir cliquer sur les liens avant que l'animation ne soit terminé     -->
