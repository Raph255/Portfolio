<!DOCTYPE html>
<html lang="'fr"></html>
    <head>
	    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="CSS/menuburger.css">
        <link rel="stylesheet" href="CSS/css_projets.css">
	    <title>Projets</title>
        
        <script src="https://kit.fontawesome.com/d974b66ed4.js" crossorigin="anonymous"></script>
        <script>

            /* Liste des boutons */
            var listButton = document.getElementsByTagName('button')
            function changementPage(x) {

                /* Déselectionne tous les boutons */
                var listInput = document.getElementsByTagName('input');
                for (var i = 0; i < listInput.length; ++i) {
                     listInput[i].checked = false; 
                    }

                var article = document.getElementById('article' + x) ;
                var button = listButton[x-1] ;  

                /* Enlève la classe actif au précédent bouton actif et la "donne" au bouton cliqué */
                var buttonactif = document.getElementsByClassName('boutonactif')[0];
                if (buttonactif != null) {
                    buttonactif.classList.remove('boutonactif') ;
                }   
                button.classList.add('boutonactif')
                
                document.getElementsByClassName('articleactif')[0].classList.remove('articleactif') ;
                article.classList.add('articleactif');
            }

        </script>
    </head>
    <body>
        <header>
            <h1> <a href="accueil.html">Mon Portfolio</a></h1>
            <input id="toggle" type="checkbox"></input>
            <label for="toggle" class="hamburger">
                <div class="top-bun"></div>
                <div class="meat"></div>
                <div class="bottom-bun"></div>
            </label>

            <div class="nav">
                <div class="nav-wrapper">
                        <div><a href="accueil.html"> Mon Portfolio </a></div>
                        <div><a href="quisuisje.html" >Qui suis-je ? </a></div>
                        <div><a href="competences.html">  Mes compétences</a> </div>
                        <div><a href="#">Me contacter</a></div>
                </div>
            </div>

        </header>
        <main>
            <input id="btn_bandeau" type="checkbox"></input>

            <aside>
                <nav>
                    <ul>
                        <li class="deroulant">
                            <input type="checkbox" id="web"></input> 
                            <label for="web">Développement Web</label>
                            <ul class="sous">
                                <li><button onclick="changementPage(1)"> Réalisation d'un site web institutionnel</button></li>
                            </ul>
                        </li>
                        <li class="deroulant"><input id="bdd" type="checkbox" ></input> 
                            <label for="bdd">Base de données</label>
                            <ul class="sous">
                                <li><button onclick="changementPage(2)"> Etude statistiques du naufrage du Titanic</button></li>
                                <li><button onclick="changementPage(3)"> Accidentologie en France</button></li> 
                            </ul>
                        </li>
                        <li class="deroulant"><input id="java" type="checkbox" ></input> 
                            <label for="java">Programmation java</label>
                            <ul class="sous">
                                <li><button onclick="changementPage(4)"> Classification automatique de dépêches</button></li>
                            </ul>
                        </li>
                            <li class="deroulant"><input id="IHM" type="checkbox" ></input> 
                            <label for="IHM">Interfaces IHM</label>
                            <ul class="sous">
                                <li><button onclick="changementPage(5)"> Logiciel de gestion d'évènements</button></li>
                            </ul>
                        </li>
                    </ul>
                </nav>

            </aside>
            <label id="bandeau" for="btn_bandeau"> <i class="fa-sharp fa-solid fa-play"></i></label>

            <section>
                <article class="articleactif" >
                    <img src="Images/mesprojets.png" alt="mes_projets" width="500px" height="500px">
                    <div>
                        <h1> Mes projets</h1>
                        <p> Ici se trouvent tous les projets réalisés, qu'ils soient personnels ou dans le cadre de mon parcours universitaire.</p>
                    </div>
                </article>
                
            </section>
        </main>
    </body>
</html>
